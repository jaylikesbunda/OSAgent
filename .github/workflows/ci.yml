name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  core:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        rust: [stable]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-
      
      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-git-
      
      - name: Cache target directory
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-target-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-target-
      
      - name: Check formatting
        run: cargo fmt -- --check
      
      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
      
      - name: Run tests
        run: cargo test --all-features --verbose
      
      - name: Build
        run: cargo build --release

  launcher:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
      fail-fast: true

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache launcher cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-launcher-cargo-registry-${{ hashFiles('launcher/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-launcher-cargo-registry-

      - name: Cache launcher cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-launcher-cargo-git-${{ hashFiles('launcher/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-launcher-cargo-git-

      - name: Cache launcher target directory
        uses: actions/cache@v4
        with:
          path: launcher/target
          key: ${{ runner.os }}-launcher-target-${{ hashFiles('launcher/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-launcher-target-

      - name: Check launcher formatting
        run: cargo fmt --manifest-path launcher/Cargo.toml --all -- --check

      - name: Run launcher clippy
        run: cargo clippy --manifest-path launcher/Cargo.toml --all-targets --all-features -- -D warnings

      - name: Build launcher
        run: cargo build --manifest-path launcher/Cargo.toml --release
