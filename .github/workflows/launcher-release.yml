name: Launcher Release

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      tag_name:
        description: Git tag to attach launcher artifacts to
        required: true
        type: string
      release_name:
        description: Release title override
        required: false
        default: ""
        type: string
      prerelease:
        description: Mark the GitHub release as a prerelease
        required: true
        default: false
        type: boolean
      create_github_release:
        description: Create or update a GitHub release after building
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build-launcher:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: osagent-launcher-linux
            binary_name: osagent-launcher
            archive_path: osagent-launcher-linux.tar.gz
          - os: windows-latest
            artifact_name: osagent-launcher-windows
            binary_name: osagent-launcher.exe
            archive_path: osagent-launcher-windows.zip
          - os: macos-latest
            artifact_name: osagent-launcher-macos
            binary_name: osagent-launcher
            archive_path: osagent-launcher-macos.tar.gz

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux launcher dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Cache launcher cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-launcher-release-cargo-registry-${{ hashFiles('launcher/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-launcher-release-cargo-registry-

      - name: Cache launcher cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-launcher-release-cargo-git-${{ hashFiles('launcher/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-launcher-release-cargo-git-

      - name: Cache launcher target directory
        uses: actions/cache@v4
        with:
          path: launcher/target
          key: ${{ runner.os }}-launcher-release-target-${{ hashFiles('launcher/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-launcher-release-target-

      - name: Build native launcher binary
        run: cargo build --manifest-path launcher/Cargo.toml --release

      - name: Package launcher artifact (Unix)
        if: matrix.os != 'windows-latest'
        run: tar czf ${{ matrix.archive_path }} -C launcher/target/release ${{ matrix.binary_name }}

      - name: Package launcher artifact (Windows)
        if: matrix.os == 'windows-latest'
        run: Compress-Archive -Path launcher/target/release/${{ matrix.binary_name }} -DestinationPath ${{ matrix.archive_path }}
        shell: pwsh

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.archive_path }}

  publish:
    needs: build-launcher
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || inputs.create_github_release

    steps:
      - name: Download built launcher artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.tag_name }}
          name: ${{ github.event_name == 'release' && github.event.release.name || inputs.release_name }}
          prerelease: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || github.event.release.prerelease }}
          files: |
            dist/**/*.tar.gz
            dist/**/*.zip
