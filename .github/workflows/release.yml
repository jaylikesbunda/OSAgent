name: Release

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      tag_name:
        description: Git tag to release
        required: true
        type: string
      release_name:
        description: Release title
        required: false
        default: ""
        type: string
      prerelease:
        description: Mark the GitHub release as a prerelease
        required: true
        default: false
        type: boolean
      create_github_release:
        description: Create or update a GitHub release after building
        required: true
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: osagent-linux
            binary_name: osagent
            archive_path: osagent-linux.tar.gz
          - os: windows-latest
            artifact_name: osagent-windows
            binary_name: osagent.exe
            archive_path: osagent-windows.zip
          - os: macos-latest
            artifact_name: osagent-macos
            binary_name: osagent
            archive_path: osagent-macos.tar.gz

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-release-cargo-registry-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-release-cargo-registry-

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-release-cargo-git-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-release-cargo-git-

      - name: Cache target directory
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-release-target-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-release-target-

      - name: Build native release binary
        run: cargo build --release

      - name: Package artifact (Unix)
        if: matrix.os != 'windows-latest'
        run: tar czf ${{ matrix.archive_path }} -C target/release ${{ matrix.binary_name }}

      - name: Package artifact (Windows)
        if: matrix.os == 'windows-latest'
        run: Compress-Archive -Path target/release/${{ matrix.binary_name }} -DestinationPath ${{ matrix.archive_path }}
        shell: pwsh

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.archive_path }}

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || inputs.create_github_release

    steps:
      - name: Download built artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.tag_name }}
          name: ${{ github.event_name == 'release' && github.event.release.name || inputs.release_name }}
          prerelease: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || github.event.release.prerelease }}
          files: |
            dist/**/*.tar.gz
            dist/**/*.zip
