name: Release

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      tag_name:
        description: Git tag to release
        required: true
        type: string
      release_name:
        description: Release title
        required: false
        default: ""
        type: string
      prerelease:
        description: Mark the GitHub release as a prerelease
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build-launcher:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            launcher_binary: osagent-launcher
            archive_name: osagent-linux-x86_64.tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            launcher_binary: osagent-launcher.exe
            archive_name: osagent-windows-x86_64.zip
          - os: macos-latest
            target: aarch64-apple-darwin
            launcher_binary: osagent-launcher
            archive_name: osagent-macos-arm64.tar.gz
          - os: macos-13
            target: x86_64-apple-darwin
            launcher_binary: osagent-launcher
            archive_name: osagent-macos-x86_64.tar.gz

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux launcher dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libwayland-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libgtk-3-dev

      - name: Cache launcher cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-launcher-cargo-registry-${{ hashFiles('launcher/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-launcher-cargo-registry-

      - name: Cache launcher cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-launcher-cargo-git-${{ hashFiles('launcher/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-launcher-cargo-git-

      - name: Cache launcher target directory
        uses: actions/cache@v4
        with:
          path: launcher/target
          key: ${{ runner.os }}-launcher-target-${{ hashFiles('launcher/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-launcher-target-

      - name: Build launcher (bundles osagent core)
        run: cargo build --manifest-path launcher/Cargo.toml --release --target ${{ matrix.target }}

      - name: Create package directory
        run: mkdir -p dist/osagent

      - name: Copy launcher binary
        shell: bash
        run: |
          chmod +x launcher/target/${{ matrix.target }}/release/${{ matrix.launcher_binary }} || true
          cp launcher/target/${{ matrix.target }}/release/${{ matrix.launcher_binary }} dist/osagent/

      - name: Create README
        shell: bash
        run: |
          cat > dist/osagent/README.txt << 'EOF'
          OSAgent - Your Open Source Agent

          To start:
            1. Run osagent-launcher (or osagent-launcher.exe on Windows)
            2. Follow the setup wizard
            3. OSA will start at http://localhost:8765

          No Rust installation required.
          EOF

      - name: Package artifact (Unix)
        if: matrix.os != 'windows-latest'
        run: tar czf ${{ matrix.archive_name }} -C dist osagent

      - name: Package artifact (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: Compress-Archive -Path dist/osagent -DestinationPath ${{ matrix.archive_name }}

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: package-${{ matrix.target }}
          path: ${{ matrix.archive_name }}

  publish:
    needs: build-launcher
    runs-on: ubuntu-latest

    steps:
      - name: Download built artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: package-*
          merge-multiple: true

      - name: List artifacts
        run: ls -la dist/

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.tag_name }}
          name: ${{ github.event_name == 'release' && github.event.release.name || inputs.release_name }}
          prerelease: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || github.event.release.prerelease }}
          files: |
            dist/*.tar.gz
            dist/*.zip
