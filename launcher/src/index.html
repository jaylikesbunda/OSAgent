<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OSAgent Launcher</title>
  <link rel="icon" href="data:," />
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Custom Title Bar -->
  <div class="titlebar" data-tauri-drag-region>
    <div class="titlebar-icon">
      <img src="icons/thinking-indicator.png" alt="OSAgent" width="20" height="20" />
    </div>
    <div class="titlebar-text" data-tauri-drag-region>OSAgent</div>
    <div class="titlebar-controls">
      <button class="titlebar-btn minimize" id="btn-minimize" title="Minimize">
        <svg viewBox="0 0 24 24"><path d="M6 12h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
      <button class="titlebar-btn close" id="btn-close" title="Close to Tray">
        <svg viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
    </div>
  </div>

  <!-- Main Content -->
  <div class="content">
    <!-- Status Card -->
    <div class="status-card" id="status-card">
      <div class="status-indicator" id="status-indicator">
        <div class="status-dot" id="status-dot"></div>
      </div>
      <div class="status-info">
        <div class="status-label" id="status-label">Stopped</div>
        <div class="status-pid" id="status-pid">PID: -</div>
      </div>
    </div>

    <!-- Action Buttons -->
    <div class="actions">
      <button class="btn btn-primary" id="btn-start">
        <svg viewBox="0 0 24 24" fill="none"><path d="M8 5v14l11-7L8 5z" fill="currentColor"/></svg>
        Start
      </button>
      <button class="btn btn-danger" id="btn-stop" disabled>
        <svg viewBox="0 0 24 24" fill="none"><rect x="6" y="6" width="12" height="12" rx="1" fill="currentColor"/></svg>
        Stop
      </button>
      <button class="btn btn-secondary" id="btn-restart" disabled>
        <svg viewBox="0 0 24 24" fill="none"><path d="M21 12a9 9 0 11-9-9c2.52 0 4.93 1 6.74 2.74L21 8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M21 5v3h-3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Restart
      </button>
    </div>

    <!-- Quick Actions -->
    <div class="quick-actions">
      <button class="btn btn-outline" id="btn-open-ui">
        <svg viewBox="0 0 24 24" fill="none"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><polyline points="15,3 21,3 21,9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><line x1="10" y1="14" x2="21" y2="3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        Open Web UI
      </button>
<button class="btn btn-outline" id="btn-build">
        <svg viewBox="0 0 24 24" fill="none"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2v11z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Build OSAgent
      </button>
    </div>

    <!-- Path Info -->
    <div class="path-info">
      <div class="path-row">
        <span class="path-label">Binary</span>
        <span class="path-value" id="path-binary">-</span>
      </div>
      <div class="path-row">
        <span class="path-label">Config</span>
        <span class="path-value" id="path-config">-</span>
      </div>
    </div>

    <!-- Log Output -->
    <div class="log-section">
      <div class="log-header">
        <span>Output Log</span>
        <button class="btn btn-tiny" id="btn-clear-log">Clear</button>
      </div>
      <div class="log-container" id="log-container"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
